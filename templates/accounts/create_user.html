{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create User - LabMS{% endblock %}
{% block page_title %}Create User{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:600px;">
  <h5 class="fw-bold mb-3"><i class="bi bi-person-plus me-2"></i>Create New User</h5>
  <form method="post" novalidate>{% csrf_token %}{% crispy form %}
    <button class="btn btn-primary mt-2">Create User</button>
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary mt-2 ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
