{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4" style="background: linear-gradient(135deg,#1a237e,#0d47a1);">
  <div class="card p-4" style="width:100%;max-width:600px;">
    <div class="text-center mb-3">
      <i class="bi bi-person-plus-fill text-primary fs-1"></i>
      <h4 class="fw-bold mt-1">Patient Registration</h4>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      {% crispy form %}
      <button class="btn btn-primary w-100 mt-2 fw-semibold" type="submit">Create Account</button>
    </form>
    <div class="text-center mt-3 small">
      Already have an account? <a href="{% url 'login' %}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
